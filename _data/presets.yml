# Preset library — edited from Site Settings → Tile presets in the CMS.
#
# scripts/apply_presets.py reads this file on every publish and writes
# the matching `default:` block list into the Tiles typed-list inside
# admin/config.yml and admin/config.local.yml. Edit a preset here,
# publish, and the next tile someone inserts with that preset starts
# from whatever's saved — this does not change tiles already on a
# page.
#
# Each `name` below must match one of the fixed preset types wired
# into admin/config.yml's Tiles list (committee / faq / sponsor /
# event). Adding a new name here on its own does nothing — see
# "Adding a new preset" in docs/editor-guide.md for what a genuinely
# new preset type requires.
presets:
  - name: committee
    label: Committee member
    blocks:
      - type: title
        text: Full Name
      - type: subtitle
        text: Role
      - type: image
      - type: expand
      - type: body
        text: Add a short bio here — a sentence or two is plenty.
      - type: email
        value: triathlon@sheffield.ac.uk

  - name: faq
    label: FAQ item
    blocks:
      - type: title
        text: Question goes here?
      - type: expand
      - type: body
        text: Answer goes here.

  - name: sponsor
    label: Sponsor
    blocks:
      - type: image
      - type: title
        text: Sponsor name
      - type: body
        text: A sentence about the sponsor.

  - name: event
    label: Event
    blocks:
      - type: title
        text: Event name
      - type: image
      - type: note
        heading: Location
        detail: ""
