# Site Settings is now the site's design system, not just branding.
# Anything an editor sets here becomes a CSS custom property in
# _layouts/default.html and cascades to every page automatically —
# individual sections/tiles keep the ability to override it locally
# (e.g. a section's own Background choice), but this is the default.
brand:
  name: University of Sheffield Triathlon Club
  short_name: Sheffield Triathlon
  tagline: Swim. Bike. Run. Belong.
  email: triathlon@sheffield.ac.uk
  logo: ""
  logo_crop_x: 50
  logo_crop_y: 50
  logo_crop_zoom: 100
theme:
  default: dark
design:
  colors:
    primary: "#F7D35D"
    secondary: "#FFFFFF"
    accent: "#F7D35D"
  cards:
    radius: normal
    shadow: soft
    padding: normal
    image_shape: square
  typography:
    heading_style: black
    body_style: normal
  layout:
    container_width: normal
    grid_gap: normal
    vertical_spacing: normal
interactions:
  # Replaces the old per-section "hover vs click" choice (Phase 3, #5).
  # Every expandable card grid on the site (committee bios, FAQs, etc)
  # now shares this one setting instead of asking an editor to pick a
  # trigger mechanism per block.
  expand_trigger: hover
footer:
  description: >
    Swim, bike and run with Sheffield Triathlon. Training, racing and socials
    for complete beginners and experienced athletes.
  affiliation: >
    A student-led University of Sheffield triathlon club connected to Sport
    Sheffield.
