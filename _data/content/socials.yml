title: Socials
description: Club socials, and how to follow along on Instagram and Facebook.
sections:
  - type: hero
    id: socials-hero
    eyebrow: Socials
    title: Triathlon isn't the only thing we do
    subtitle: Socials run alongside the training calendar
    body: >
      Nothing is compulsory, and you don't need to have raced anything to
      come along — socials are usually the easiest way to get to know
      people in the club.

  - type: text
    id: socials-intro
    eyebrow: What to expect
    title: A club that hangs out outside of kit
    subtitle: ""
    body: |
      Socials happen most weeks alongside training. Check Instagram and
      Facebook for what's coming up — that's where session changes,
      social plans and race information are posted first.

  - type: events
    id: socials-calendar
    eyebrow: Coming up
    title: This term's socials
    subtitle: ""
    items:
      - title: Welcome social
        date: Week 1
        location: Local pub, details on Instagram
        type: Social
        description: The easiest way to meet the club before your first session.
      - title: Post-training coffee
        date: Every Saturday, after the club ride
        location: Endcliffe Park café
        type: Weekly
        description: Casual and drop-in — no need to have ridden to come along.
      - title: Race season send-off
        date: April
        location: TBC
        type: Social
        description: A send-off before the club heads to the Sheffield Sprint Triathlon.
      - title: End-of-year social
        date: May
        location: TBC
        type: Social
        description: The year's biggest social, celebrating the season with the whole club.

  - type: socials
    id: socials-links
    eyebrow: Follow along
    title: Find us online
    subtitle: The fastest way to hear about session changes, race entries and social plans.
    layout: cards
    items:
      - platform: Instagram
        title: "@sheffunitri"
        description: Session updates, race photos and the fastest way to reach the committee.
        url: https://www.instagram.com/sheffunitri/
        button: Follow
      - platform: Facebook
        title: UoSTriathlon
        description: Event pages, committee announcements and the wider alumni network.
        url: https://www.facebook.com/UoSTriathlon/
        button: Like page
      - platform: Email
        title: Get in touch
        description: For anything that doesn't fit in a DM — membership questions, kit orders, or general queries.
        url: mailto:triathlon@sheffield.ac.uk
        button: Email us
