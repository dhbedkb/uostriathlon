title: Socials
description: Club socials, and how to follow along on Instagram and Facebook.
sections:
- type: hero
  id: socials-hero
  eyebrow: Socials
  title: Triathlon isn't the only thing we do
  subtitle: Socials run alongside the training calendar
  body: 'Nothing is compulsory, and you don''t need to have raced anything to come along — socials are usually the easiest way to get to know people in the club.

    '
- type: text
  id: socials-intro
  eyebrow: What to expect
  title: A club that hangs out outside of kit
  subtitle: ''
  body: 'Socials happen most weeks alongside training. Check Instagram and

    Facebook for what''s coming up — that''s where session changes,

    social plans and race information are posted first.

    '
- type: tile-grid
  id: socials-calendar
  eyebrow: Coming up
  title: This term's socials
  layout:
    columns: 3
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: event
    badge: Week 1
    blocks:
    - type: title
      text: Welcome social
    - type: body
      text: The easiest way to meet the club before your first session.
    - type: note
      heading: Type
      detail: Social
    - type: note
      heading: Location
      detail: Local pub, details on Instagram
  - preset: event
    badge: Every Saturday, after the club ride
    blocks:
    - type: title
      text: Post-training coffee
    - type: body
      text: Casual and drop-in — no need to have ridden to come along.
    - type: note
      heading: Type
      detail: Weekly
    - type: note
      heading: Location
      detail: Endcliffe Park café
  - preset: event
    badge: April
    blocks:
    - type: title
      text: Race season send-off
    - type: body
      text: A send-off before the club heads to the Sheffield Sprint Triathlon.
    - type: note
      heading: Type
      detail: Social
    - type: note
      heading: Location
      detail: TBC
  - preset: event
    badge: May
    blocks:
    - type: title
      text: End-of-year social
    - type: body
      text: The year's biggest social, celebrating the season with the whole club.
    - type: note
      heading: Type
      detail: Social
    - type: note
      heading: Location
      detail: TBC
- type: tile-grid
  id: socials-links
  eyebrow: Follow along
  title: Find us online
  subtitle: The fastest way to hear about session changes, race entries and social plans.
  layout:
    columns: 4
    equal_height: true
    width: normal
    padding: normal
    background: default
    chip_style: false
  tiles:
  - preset: custom
    blocks:
    - type: eyebrow
      text: Instagram
    - type: title
      text: '@sheffunitri'
    - type: body
      text: Session updates, race photos and the fastest way to reach the committee.
    - type: buttons
      items:
      - label: Follow
        url: https://www.instagram.com/sheffunitri/
        style: secondary
  - preset: custom
    blocks:
    - type: eyebrow
      text: Facebook
    - type: title
      text: UoSTriathlon
    - type: body
      text: Event pages, committee announcements and the wider alumni network.
    - type: buttons
      items:
      - label: Like page
        url: https://www.facebook.com/UoSTriathlon/
        style: secondary
  - preset: custom
    blocks:
    - type: eyebrow
      text: Email
    - type: title
      text: Get in touch
    - type: body
      text: For anything that doesn't fit in a DM — membership questions, kit orders, or general queries.
    - type: buttons
      items:
      - label: Email us
        url: mailto:triathlon@sheffield.ac.uk
        style: secondary
