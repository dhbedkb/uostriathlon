title: Members
description: What membership includes, and how to join Sheffield Triathlon Club.
sections:
- type: hero
  id: members-hero
  eyebrow: Members Area
  title: What membership includes
  subtitle: One membership, every session
  body: 'Membership covers coached training across all three disciplines, access to club bikes, discounted race entries, and club kit.

    '
- type: tile-grid
  id: members-stats
  preset: stats
  eyebrow: What you get
  title: Membership at a glance
  layout:
    columns: 4
    equal_height: true
    width: normal
    padding: normal
    background: default
  behavior:
    expand: none
  tiles:
  - title: '6'
    subtitle: Coached sessions a week
  - title: £
    subtitle: Discounted race entries
  - title: '2'
    subtitle: Free weeks before joining
  - title: '365'
    subtitle: Days of club community
- type: tile-grid
  id: members-benefits
  preset: custom
  eyebrow: Membership benefits
  title: What's included
  layout:
    columns: 3
    equal_height: true
    width: normal
    padding: normal
    background: default
  behavior:
    expand: none
  tiles:
  - title: Coached training
    body: 'Access to all weekly swim, bike and run sessions, plus the Give It A Go beginner pathway.

      '
  - title: Club bikes
    body: 'Bikes you can borrow for turbo sessions and outdoor rides if you don''t have your own in Sheffield.

      '
  - title: Race support
    body: 'Block-booked entries, discounted fees, and an experienced member at every club-supported race.

      '
  - title: Club kit
    body: 'Discounted club tri suits and training kit, ordered each term through the Kit Secretary.

      '
- type: tile-grid
  id: members-join
  preset: cta
  layout:
    columns: 1
    equal_height: false
    width: narrow
    padding: spacious
    background: default
    align_center: true
  behavior:
    expand: none
  tiles:
  - title: Membership starts through the Students' Union
    body: 'Come to any beginner-friendly session before committing — you don''t need to be a member for your first two weeks.

      '
    buttons:
    - label: Join via the Students' Union
      url: https://www.sheffieldstudentsunion.com/activities/societies/
      style: primary
    - label: See the training schedule
      url: /training/
      style: secondary
    eyebrow: Ready to join?
    style: accent
- type: tile-grid
  id: members-faq
  preset: faq
  eyebrow: Questions
  title: Membership FAQs
  layout:
    columns: 1
    equal_height: false
    width: narrow
    padding: normal
    background: default
  behavior:
    expand: click
  tiles:
  - title: Is membership only for University of Sheffield students?
    body: 'Membership is open to current students and staff of the University of Sheffield. Contact the committee if you''re unsure whether you''re eligible.

      '
  - title: Can I try a session before joining?
    body: 'Yes — come to any beginner-friendly session listed on the training page first, no membership required.

      '
  - title: How do I renew my membership each year?
    body: 'Membership runs through the Students'' Union and renews annually — you''ll get a reminder from the committee before your renewal date.

      '
