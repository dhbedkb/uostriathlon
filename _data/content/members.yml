title: Members
description: What membership includes, and how to join Sheffield Triathlon Club.
sections:
- type: hero
  id: members-hero
  eyebrow: Members Area
  title: What membership includes
  subtitle: One membership, every session
  body: 'Membership covers coached training across all three disciplines, access to club bikes, discounted race entries, and club kit.

    '
- type: tile-grid
  id: members-stats
  eyebrow: What you get
  title: Membership at a glance
  layout:
    columns: 4
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: custom
    blocks:
    - type: title
      text: '6'
    - type: subtitle
      text: Coached sessions a week
  - preset: custom
    blocks:
    - type: title
      text: £
    - type: subtitle
      text: Discounted race entries
  - preset: custom
    blocks:
    - type: title
      text: '2'
    - type: subtitle
      text: Free weeks before joining
  - preset: custom
    blocks:
    - type: title
      text: '365'
    - type: subtitle
      text: Days of club community
- type: tile-grid
  id: members-benefits
  eyebrow: Membership benefits
  title: What's included
  layout:
    columns: 3
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: custom
    blocks:
    - type: title
      text: Coached training
    - type: body
      text: 'Access to all weekly swim, bike and run sessions, plus the Give It A Go beginner pathway.

        '
  - preset: custom
    blocks:
    - type: title
      text: Club bikes
    - type: body
      text: 'Bikes you can borrow for turbo sessions and outdoor rides if you don''t have your own in Sheffield.

        '
  - preset: custom
    blocks:
    - type: title
      text: Race support
    - type: body
      text: 'Block-booked entries, discounted fees, and an experienced member at every club-supported race.

        '
  - preset: custom
    blocks:
    - type: title
      text: Club kit
    - type: body
      text: 'Discounted club tri suits and training kit, ordered each term through the Kit Secretary.

        '
- type: tile-grid
  id: members-join
  layout:
    columns: 1
    equal_height: false
    width: narrow
    padding: spacious
    background: default
    align_center: true
  tiles:
  - preset: custom
    style: accent
    blocks:
    - type: eyebrow
      text: Ready to join?
    - type: title
      text: Membership starts through the Students' Union
    - type: body
      text: 'Come to any beginner-friendly session before committing — you don''t need to be a member for your first two weeks.

        '
    - type: buttons
      items:
      - label: Join via the Students' Union
        url: https://www.sheffieldstudentsunion.com/activities/societies/
        style: primary
      - label: See the training schedule
        url: /training/
        style: secondary
- type: tile-grid
  id: members-faq
  eyebrow: Questions
  title: Membership FAQs
  layout:
    columns: 1
    equal_height: false
    width: narrow
    padding: normal
    background: default
  tiles:
  - preset: faq
    blocks:
    - type: title
      text: Is membership only for University of Sheffield students?
    - type: expand
    - type: body
      text: 'Membership is open to current students and staff of the University of Sheffield. Contact the committee if you''re unsure whether you''re eligible.

        '
  - preset: faq
    blocks:
    - type: title
      text: Can I try a session before joining?
    - type: expand
    - type: body
      text: 'Yes — come to any beginner-friendly session listed on the training page first, no membership required.

        '
  - preset: faq
    blocks:
    - type: title
      text: How do I renew my membership each year?
    - type: expand
    - type: body
      text: 'Membership runs through the Students'' Union and renews annually — you''ll get a reminder from the committee before your renewal date.

        '
