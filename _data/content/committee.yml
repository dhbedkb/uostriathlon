  - type: tile-grid
    id: committee-faq
    eyebrow: Getting involved
    title: Want to join the committee?
    layout:
      columns: 1
      equal_height: false
      width: narrow
      padding: normal
      background: default
    tiles:
      - preset: faq
        blocks:
          - type: title
            text: When are committee elections held?
          - type: expand
          - type: body
            text: >
              Elections are held at the club's AGM, usually in the spring term.
              Details are shared with members ahead of time on Instagram and by
              email.
      - preset: faq
        blocks:
          - type: title
            text: Do I need previous committee experience?
          - type: expand
          - type: body
            text: >
              No — most committee members' first role was on this committee.
              Outgoing members hand over notes and are always happy to help.
