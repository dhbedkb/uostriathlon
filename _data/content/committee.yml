  - type: faq
    id: committee-faq
    eyebrow: Getting involved
    title: Want to join the committee?
    subtitle: ""
    items:
      - question: When are committee elections held?
        answer: >
          Elections are held at the club's AGM, usually in the spring term.
          Details are shared with members ahead of time on Instagram and by
          email.
      - question: Do I need previous committee experience?
        answer: >
          No — most of our committee members' first role was on this
          committee. Outgoing members hand over notes and are always happy
          to help.
