title: Training
description: Weekly swim, bike and run sessions for every ability, plus two free weeks for beginners at the start of the year.
sections:
- type: hero
  id: training-hero
  eyebrow: Training
  title: Six sessions a week
  subtitle: Coached, structured, and grouped by pace not experience
  body: 'You don''t need to attend every session, and you don''t need to be training for anything specific — come to as many or as few as fit your week.

    '
- type: text
  id: training-intro
  eyebrow: How it works
  title: Pick the sessions that suit your week
  subtitle: ''
  body: 'Sessions are grouped by pace, so you''re training alongside people

    at a similar level whether it''s your first year or your last. Club

    bikes are available to borrow for anyone who doesn''t have their

    own, and full session times are confirmed each semester in the

    members area.

    '
- type: tile-grid
  id: training-schedule
  eyebrow: Weekly schedule
  title: This week's sessions
  subtitle: Locations and times are confirmed each semester — check the members area for the current schedule.
  layout:
    columns: 3
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: event
    badge: Mondays, 6:00–7:00pm
    blocks:
    - type: title
      text: Pool swim
    - type: body
      text: Coached technique work followed by a set. All strokes and levels welcome.
    - type: note
      heading: Type
      detail: Swim
    - type: note
      heading: Location
      detail: Sheffield University Sports Centre pool
  - preset: event
    badge: Tuesdays, 7:00–8:00pm
    blocks:
    - type: title
      text: Turbo session
    - type: body
      text: Indoor structured intervals — no outdoor bike needed to take part.
    - type: note
      heading: Type
      detail: Bike
    - type: note
      heading: Location
      detail: Goodwin Sports Centre
  - preset: event
    badge: Wednesdays, 6:30–7:30pm
    blocks:
    - type: title
      text: Track running
    - type: body
      text: Pace-group intervals, from first 5k to marathon training.
    - type: note
      heading: Type
      detail: Run
    - type: note
      heading: Location
      detail: Goodwin Sports Centre track
  - preset: event
    badge: Thursdays, 6:00–7:00pm
    blocks:
    - type: title
      text: Open pool swim
    - type: body
      text: A more relaxed session for building distance and confidence in the water.
    - type: note
      heading: Type
      detail: Swim
    - type: note
      heading: Location
      detail: Sheffield University Sports Centre pool
  - preset: event
    badge: Saturdays, 9:00am
    blocks:
    - type: title
      text: Club road ride
    - type: body
      text: Group ride into the Peak District, with a faster group for those who want intervals.
    - type: note
      heading: Type
      detail: Bike
    - type: note
      heading: Location
      detail: Meet at Endcliffe Park
  - preset: event
    badge: Sundays, 9:30am
    blocks:
    - type: title
      text: Sunday long run
    - type: body
      text: Steady long run with shorter and longer route options.
    - type: note
      heading: Type
      detail: Run
    - type: note
      heading: Location
      detail: Meet at Weston Park
- type: tile-grid
  id: training-pathway
  eyebrow: New to triathlon
  title: Give It A Go
  subtitle: Two free weeks of training at the start of the year, for anyone with no prior multisport experience.
  layout:
    columns: 3
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: custom
    blocks:
    - type: title
      text: Week 1 — Foundations
    - type: body
      text: 'Front crawl technique in the pool, getting comfortable on a bike in a group, and an easy running base.

        '
  - preset: custom
    blocks:
    - type: title
      text: Week 2 — Race ready
    - type: body
      text: 'Brick sessions (bike-to-run transitions), transition practice, and everything you need for race-day logistics.

        '
  - preset: custom
    blocks:
    - type: title
      text: The duathlon
    - type: body
      text: 'The two weeks end with the Give It A Go duathlon — a chance to meet the club and decide if it''s for you.

        '
- type: tile-grid
  id: training-faq
  eyebrow: Questions
  title: Training FAQs
  layout:
    columns: 1
    equal_height: false
    width: narrow
    padding: normal
    background: default
  tiles:
  - preset: faq
    blocks:
    - type: title
      text: Do I need my own bike to start training?
    - type: expand
    - type: body
      text: 'No — the club has bikes you can borrow, and several members car-share or hire bikes for outdoor rides until they''re ready to buy their own.

        '
  - preset: faq
    blocks:
    - type: title
      text: I can't swim front crawl. Can I still join?
    - type: expand
    - type: body
      text: 'Yes. Coached swim sessions are built around technique, and beginners train separately so you''re never out of your depth.

        '
  - preset: faq
    blocks:
    - type: title
      text: What should I bring to my first session?
    - type: expand
    - type: body
      text: 'Kit for whichever discipline you''re trying — swimwear and a towel for pool sessions, or trainers for a run. We''ll talk you through anything else you need.

        '
