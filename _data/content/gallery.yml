title: Gallery
description: Photos from training, racing, socials and club life.

sections:
  - type: hero
    id: gallery-hero
    eyebrow: Gallery
    title: Gallery
    subtitle: Training days, race days and socials.
    body: Add real images into assets/images/gallery and update this YAML file.
    background_image: /assets/images/gallery/hero.jpg
    primary_button:
      label: Join Today
      url: /join/
    secondary_button:
      label: View Training
      url: /training/

