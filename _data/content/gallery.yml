        caption: Racing placeholder.
      - src: /assets/images/gallery/gallery-3.jpg
        alt: Sheffield Triathlon club photo 3
        caption: Socials placeholder.
      - src: /assets/images/gallery/gallery-4.jpg
        alt: Sheffield Triathlon club photo 4
        caption: Peaks placeholder.
      - src: /assets/images/gallery/gallery-5.jpg
