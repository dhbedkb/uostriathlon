  tiles:
  - eyebrow: Beginners
    title: Give It A Go
    body: 'Two free weeks of training at the start of the year, ending in a beginner-friendly duathlon — no bike or wetsuit required.

      '
    buttons:
    - label: Learn more
      url: /training/
      style: secondary
  - eyebrow: Training
    title: Weekly sessions
    body: 'Coached swim, bike and run sessions for every pace, plus club bikes you can borrow if you don''t have your own.

      '
    buttons:
    - label: Learn more
      url: /training/
      style: secondary
  - eyebrow: Community
    title: Racing & socials
    body: 'Club trips to local and national races, and a social calendar that runs alongside the training week.

      '
    buttons:
    - label: Learn more
      url: /socials/
      style: secondary
- type: text
  id: home-about
  eyebrow: About us
  title: A club for every kind of triathlete
  subtitle: ''
  body: 'We''re a student-run triathlon club connected to the University of

    Sheffield and Sport Sheffield, open to students and staff of all

    abilities. Sheffield sits right on the edge of the Peak District,

    where our outdoor bike sessions take place, and club bikes are

    available to borrow if you don''t have your own.


    Some members are training for their first sprint triathlon; others

    are working towards qualification times. Most weeks you''ll find

    both training side by side.

    '
- type: tile-grid
  id: join
  preset: cta
  layout:
