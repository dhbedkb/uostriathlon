- title: University of Sheffield Triathlon Club
description: Swim, bike and run with Sheffield’s student triathlon club.
sections:
  - type: hero
    id: home-hero
    eyebrow: University of Sheffield
    title: University of Sheffield Triathlon Club
    subtitle: Swim. Bike. Run. Belong.
    body: Training, racing and social sport for all abilities.
    primary_button:
      label: Join Today
      url: /join/
    secondary_button:
      label: View Training
      url: /training/

  - type: stats
    id: club-stats
    eyebrow: Club at a Glance
    title: Train, race and belong.
    subtitle: A student triathlon community built around performance, inclusivity and friendship.
    items:
      - number: 150+
        label: Members
      - number: 6
        label: Weekly Sessions
      - number: 40+
        label: Races
      - number: BUCS
        label: Competitive Team

  - type: cards
    id: training-overview
    eyebrow: Training
    title: Swim. Bike. Run. Repeat.
    subtitle: Sessions for complete beginners, social athletes and experienced racers.
    cards:
      - title: Swimming
        label: Swim
        description: Coached pool sessions for a range of abilities.
        schedule: Weekly sessions
        location: Sheffield
        url: /training/#swimming
      - title: Cycling
        label: Bike
        description: Social and structured rides around Sheffield and the Peak District.
        schedule: Weekly rides
        location: Sheffield and Peak District
        url: /training/#cycling
      - title: Running
        label: Run
        description: Group runs, speed work and friendly training routes.
        schedule: Weekly runs
        location: Sheffield
        url: /training/#running

  - type: events
    id: upcoming-events
    eyebrow: Events
    title: Upcoming races and socials.
    subtitle: From beginner-friendly events to competitive racing.
    items:
      - title: Give it a Go Duathlon
        date: September
        location: Sheffield
        type: Beginner Event
        description: A friendly first step into multisport.
        url: /join/
      - title: Club Social
        date: TBC
        location: Sheffield
        type: Social
        description: Meet the club away from training.
        url: /news/
      - title: BUCS Triathlon
        date: Spring
        location: TBC
        type: Race
        description: Competitive university racing opportunity.
        url: /races/

  - type: gallery
    id: gallery-preview
    eyebrow: Gallery
    title: Club life in motion.
    subtitle: Training, racing, socials and Sheffield adventures.
    images:
      - category: Training
        caption: Weekly training with the club.
      - category: Racing
        caption: Race days across the season.
      - category: Socials
        caption: Student life beyond training.

  - type: cta
    id: join-cta
    eyebrow: Join
    title: Ready to join Sheffield Triathlon?
    body: You do not need to be a triathlete to start. Come along, meet the club and give it a go.
    primary_button:
      label: Join Now
      url: /join/
    secondary_button:
      label: Ask a Question
      url: mailto:triathlon@sheffield.ac.uk

