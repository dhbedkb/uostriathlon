title: University of Sheffield Triathlon Club
description: Swim, bike and run with Sheffield’s student triathlon club.

sections:
  - type: hero
    id: home-hero
    eyebrow: University of Sheffield
    title: Sheffield Triathlon
    subtitle: Swim. Bike. Run. Belong.
    body: A student-led triathlon club for complete beginners, social athletes and experienced racers.
    background_image: /assets/images/home/hero.jpg
    primary_button:
      label: Join Today
      url: /join/
    secondary_button:
      label: View Training
      url: /training/

  - type: text
    id: about-club
    eyebrow: About
    title: Triathlon sounds intense. Joining us does not have to be.
    body: >
      Triathlon is three sports back to back — swim, bike and run — but you do not
      need to arrive as a triathlete. Sheffield Triathlon welcomes complete beginners,
      people from single-sport backgrounds, social members and experienced racers.

      The club trains across swimming, cycling and running, with a strong student
      community and routes that make the most of Sheffield and the Peak District.

  - type: stats
    id: club-stats
    eyebrow: Club at a Glance
    title: Train, race and belong.
    subtitle: Placeholder numbers for now — update when committee confirms current figures.
    items:
      - number: 150+
        label: Members
      - number: 6
        label: Weekly Sessions
      - number: 40+
        label: Races
      - number: BUCS
        label: Competitive Team

  - type: cards
    id: highlights
    eyebrow: Club Life
    title: More than just training.
    subtitle: The club should feel welcoming, active and social from the first visit.
    cards:
      - title: Training
        label: Train
        description: Swim, bike and run sessions for a range of abilities.
        image: /assets/images/home/training.jpg
        url: /training/
      - title: Events
        label: Events
        description: Race opportunities, Give it a Go sessions and club activities.
        image: /assets/images/home/events.jpg
        url: /events/
      - title: Socials
        label: Social
        description: Student socials, community, trips and memories beyond sport.
        image: /assets/images/home/socials.jpg
        url: /socials/

  - type: socials
    id: social-integrations
    eyebrow: Follow
    title: Keep up with the club.
    subtitle: Instagram and Strava are the best live channels for now.
    items:
      - platform: Instagram
        title: Instagram
        description: Follow the club for photos, freshers updates, socials and training reminders.
        url: https://www.instagram.com/sheffunitri/
        button: Open Instagram
      - platform: Strava
        title: Strava
        description: Add the club Strava link here once confirmed.
        url: "#"
        button: Open Strava

  - type: cta
    id: final-join-cta
    eyebrow: Join
    title: Ready to give triathlon a go?
    body: You do not need to be a triathlete to start. Come along, meet the club and try a session.
    primary_button:
      label: Join Now
      url: /join/
    secondary_button:
      label: Email the Club
      url: mailto:triathlon@sheffield.ac.uk
