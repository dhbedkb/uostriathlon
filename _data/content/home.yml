title: University of Sheffield Triathlon Club
description: Swim, bike and run with Sheffield’s student triathlon club.
sections:
- type: hero
  id: home-hero
  eyebrow: University of Sheffield
  title: Sheffield Triathlon
  subtitle: Swim. Bike. Run. Belong.
  body: A student-led triathlon club for complete beginners, social athletes and experienced
    racers.
  primary_button:
    label: Join Today
    url: /join/
  secondary_button:
    label: View Training
    url: /training/
- type: text
  id: about-club
  eyebrow: About
  title: Triathlon sounds intense. Joining us does not have to be.
  body: 'Triathlon is three sports back to back — swim, bike and run — but you do
    not need to arrive as a triathlete. Sheffield Triathlon welcomes complete beginners,
    people from single-sport backgrounds, social members and experienced racers.

    The club trains across swimming, cycling and running, with a strong student community
    and routes that make the most of Sheffield and the Peak District.

    '
