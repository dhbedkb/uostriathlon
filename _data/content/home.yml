title: Home
description: Swim, bike and run with the University of Sheffield Triathlon Club — training, racing and socials for complete beginners and experienced athletes.
sections:
- type: hero
  id: home-hero
  eyebrow: University of Sheffield Triathlon Club
  title: Swim. Bike. Run.
  subtitle: Open to all abilities — no experience needed
  body: 'A student-run club for anyone at the University of Sheffield, from complete beginners to experienced triathletes. We run coached sessions across all three disciplines, club bikes you can borrow, and two weeks of free training at the start of the year.

    '
  primary_button:
    label: Join the club
    url: /#join
  secondary_button:
    label: See training sessions
    url: /training/
- type: tile-grid
  id: home-stats
  eyebrow: The club in numbers
  title: A growing multisport community
  layout:
    columns: 4
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: custom
    blocks:
    - type: title
      text: 150+
    - type: subtitle
      text: Members
  - preset: custom
    blocks:
    - type: title
      text: '6'
    - type: subtitle
      text: Sessions a week
  - preset: custom
    blocks:
    - type: title
      text: '12'
    - type: subtitle
      text: Races supported each year
  - preset: custom
    blocks:
    - type: title
      text: '0'
    - type: subtitle
      text: Experience required to start
- type: relay-bar
  id: home-relay
  eyebrow: How training breaks down
  title: Swim, bike, run — in that order, every week
- type: tile-grid
  id: home-highlights
  eyebrow: Getting started
  title: Three ways in
  subtitle: However you get involved, you'll be training and racing alongside people at a similar level.
  layout:
    columns: 3
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: custom
    blocks:
    - type: eyebrow
      text: Beginners
    - type: title
      text: Give It A Go
    - type: body
      text: 'Two free weeks of training at the start of the year, ending in a beginner-friendly duathlon — no bike or wetsuit required.

        '
    - type: buttons
      items:
      - label: Learn more
        url: /training/
        style: secondary
  - preset: custom
    blocks:
    - type: eyebrow
      text: Training
    - type: title
      text: Weekly sessions
    - type: body
      text: 'Coached swim, bike and run sessions for every pace, plus club bikes you can borrow if you don''t have your own.

        '
    - type: buttons
      items:
      - label: Learn more
        url: /training/
        style: secondary
  - preset: custom
    blocks:
    - type: eyebrow
      text: Community
    - type: title
      text: Racing & socials
    - type: body
      text: 'Club trips to local and national races, and a social calendar that runs alongside the training week.

        '
    - type: buttons
      items:
      - label: Learn more
        url: /socials/
        style: secondary
- type: text
  id: home-about
  eyebrow: About us
  title: A club for every kind of triathlete
  subtitle: ''
  body: 'We''re a student-run triathlon club connected to the University of

    Sheffield and Sport Sheffield, open to students and staff of all

    abilities. Sheffield sits right on the edge of the Peak District,

    where our outdoor bike sessions take place, and club bikes are

    available to borrow if you don''t have your own.


    Some members are training for their first sprint triathlon; others

    are working towards qualification times. Most weeks you''ll find

    both training side by side.

    '
- type: tile-grid
  id: join
  layout:
    columns: 1
    equal_height: false
    width: narrow
    padding: spacious
    background: default
    align_center: true
  tiles:
  - preset: custom
    style: accent
    blocks:
    - type: eyebrow
      text: Getting started
    - type: title
      text: Come to a session before you decide
    - type: body
      text: 'Full membership isn''t needed for your first visit — turn up to any beginner-friendly session to see what training''s actually like.

        '
    - type: buttons
      items:
      - label: Join the club
        url: https://www.sheffieldstudentsunion.com/activities/societies/
        style: primary
      - label: Ask us a question
        url: /socials/
        style: secondary
