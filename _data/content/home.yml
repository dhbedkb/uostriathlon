    width: narrow
    padding: spacious
    background: default
    align_center: true
  behavior:
    expandable: false
  tiles:
  - title: Come to a session before you decide
    body: 'Full membership isn''t needed for your first visit — turn up to any beginner-friendly session to see what training''s actually like.

      '
    buttons:
    - label: Join the club
      url: https://www.sheffieldstudentsunion.com/activities/societies/
