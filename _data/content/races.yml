title: Races
description: Races the club supports each season, from beginner-friendly sprint distance events to national student championships.
sections:
  - type: hero
    id: races-hero
    eyebrow: Races
    title: From your first sprint to BUCS
    subtitle: Club-supported races, every season
    body: >
      Entries are block-booked, transport is organised, and an
      experienced member always comes along — first-timers are usually
      paired with someone who's raced before.

  - type: text
    id: races-intro
    eyebrow: Racing with the club
    title: You're never racing alone
    subtitle: ""
    body: |
      Whether it's a local sprint triathlon or the British Universities
      Championships, members race together and support each other
      through transition.

  - type: events
    id: races-calendar
    eyebrow: Season calendar
    title: Upcoming races
    subtitle: Full details, entry links and deadlines are shared on the members area and club socials closer to each date.
    items:
      - title: Sheffield Sprint Triathlon
        date: April
        location: Sheffield
        type: Sprint distance
        description: A popular first triathlon for new members.
      - title: BUCS Triathlon Championships
        date: May
        location: Nottingham
        type: Standard distance
        description: The national university championships — open to all abilities, with a club relay team too.
      - title: Peak District Duathlon
        date: June
        location: Peak District
        type: Duathlon
        description: An off-road alternative for members who prefer running and biking to swimming.
      - title: Castle Howard Triathlon
        date: July
        location: North Yorkshire
        type: Standard & sprint distance
        description: A club trip with both sprint and standard distance options on the day.
      - title: Club Championship Sprint
        date: September
        location: Sheffield
        type: Internal club race
        description: The club's own end-of-season race, followed by a social.

  - type: cta
    id: races-cta
    eyebrow: First time racing?
    title: Talk to the committee about your first race
    body: >
      Come to a training session and ask the committee about upcoming
      races — they'll point you to the right distance and talk you
      through what race day involves.
    primary_button:
      label: See training sessions
      url: /training/
    secondary_button:
      label: Talk to the committee
      url: /committee/
