title: Races
description: Races the club supports each season, from beginner-friendly sprint distance events to national student championships.
sections:
- type: hero
  id: races-hero
  eyebrow: Races
  title: From your first sprint to BUCS
  subtitle: Club-supported races, every season
  body: 'Entries are block-booked, transport is organised, and an experienced member always comes along — first-timers are usually paired with someone who''s raced before.

    '
- type: text
  id: races-intro
  eyebrow: Racing with the club
  title: You're never racing alone
  subtitle: ''
  body: 'Whether it''s a local sprint triathlon or the British Universities

    Championships, members race together and support each other

    through transition.

    '
- type: tile-grid
  id: races-calendar
  eyebrow: Season calendar
  title: Upcoming races
  subtitle: Full details, entry links and deadlines are shared on the members area and club socials closer to each date.
  layout:
    columns: 3
    equal_height: true
    width: normal
    padding: normal
    background: default
  tiles:
  - preset: event
    badge: April
    blocks:
    - type: title
      text: Sheffield Sprint Triathlon
    - type: body
      text: A popular first triathlon for new members.
    - type: note
      heading: Type
      detail: Sprint distance
    - type: note
      heading: Location
      detail: Sheffield
  - preset: event
    badge: May
    blocks:
    - type: title
      text: BUCS Triathlon Championships
    - type: body
      text: The national university championships — open to all abilities, with a club relay team too.
    - type: note
      heading: Type
      detail: Standard distance
    - type: note
      heading: Location
      detail: Nottingham
  - preset: event
    badge: June
    blocks:
    - type: title
      text: Peak District Duathlon
    - type: body
      text: An off-road alternative for members who prefer running and biking to swimming.
    - type: note
      heading: Type
      detail: Duathlon
    - type: note
      heading: Location
      detail: Peak District
  - preset: event
    badge: July
    blocks:
    - type: title
      text: Castle Howard Triathlon
    - type: body
      text: A club trip with both sprint and standard distance options on the day.
    - type: note
      heading: Type
      detail: Standard & sprint distance
    - type: note
      heading: Location
      detail: North Yorkshire
  - preset: event
    badge: September
    blocks:
    - type: title
      text: Club Championship Sprint
    - type: body
      text: The club's own end-of-season race, followed by a social.
    - type: note
      heading: Type
      detail: Internal club race
    - type: note
      heading: Location
      detail: Sheffield
- type: tile-grid
  id: races-cta
  layout:
    columns: 1
    equal_height: false
    width: narrow
    padding: spacious
    background: default
    align_center: true
  tiles:
  - preset: custom
    style: accent
    blocks:
    - type: eyebrow
      text: First time racing?
    - type: title
      text: Talk to the committee about your first race
    - type: body
      text: 'Come to a training session and ask the committee about upcoming races — they''ll point you to the right distance and talk you through what race day involves.

        '
    - type: buttons
      items:
      - label: See training sessions
        url: /training/
        style: primary
      - label: Talk to the committee
        url: /committee/
        style: secondary
