name: Optimise site images

on:
  push:
    paths:
      - "assets/images/source/**"
      - "assets/images/committee/raw/**"
      - "_data/content/**.yml"

permissions:
  contents: write

jobs:
  optimise:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Install dependencies
        run: python -m pip install pillow pyyaml

      - name: Optimise site images
        run: python scripts/optimise_site_images.py

      - name: Commit optimised images
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add assets/images/generated assets/images/committee/profiles _data/content
            git commit -m "Optimise site images"
            git push
          else
            echo "No image optimisation changes."
          fi
