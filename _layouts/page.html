---
layout: default
---

{% assign page_content = site.data.content[page.content_file] %}

{% if page_content %}
  {% include renderer.html sections=page_content.sections %}
{% else %}
  <section class="section">
    <div class="container">
      <h1>{{ page.title }}</h1>
      {{ content }}
    </div>
  </section>
{% endif %}
