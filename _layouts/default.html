<!doctype html>
<html lang="{{ site.lang | default: 'en-GB' }}" data-theme="{{ site.data.settings.theme.default | default: 'dark' }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    {% seo %}

    <meta name="theme-color" content="{{ site.data.settings.theme.colors.navy | default: '#07111F' }}">
    <meta name="color-scheme" content="dark light">

    <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  </head>

  <body>
    <a class="skip-link" href="#main">Skip to content</a>

    {% include navbar.html %}

    <main id="main" tabindex="-1">
      {{ content }}
    </main>

    {% include footer.html %}

    <script src="{{ '/assets/js/app.js' | relative_url }}" defer></script>
  </body>
</html>
