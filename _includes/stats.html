<section id="{{ include.section_id }}" class="section section-stats" data-section-type="stats">
  <div class="container">
    {% include section-heading.html
      eyebrow=include.section.eyebrow
      title=include.section.title
      subtitle=include.section.subtitle
      alignment=include.section.alignment
    %}

    {% if include.section.items %}
      <div class="tile-grid stats-grid">
        {% for item in include.section.items %}
          <article class="tile stat-card reveal-card">
            <strong>{{ item.number }}</strong>
            <span>{{ item.label }}</span>
          </article>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</section>
