<section id="{{ include.section_id }}" class="section section-relay-bar" data-section-type="relay-bar">
  <div class="container">
    {% include section-heading.html
      eyebrow=include.section.eyebrow
      title=include.section.title
      alignment=include.section.alignment
    %}
    <div class="relay-bar" role="presentation">
      <span class="swim"></span><span class="bike"></span><span class="run"></span>
    </div>
    <div class="relay-key">
      <span class="swim"><i></i>Swim</span>
      <span class="bike"><i></i>Bike</span>
      <span class="run"><i></i>Run</span>
    </div>
  </div>
</section>
