{% assign heading_alignment = include.alignment | default: "left" %}

<header class="section-heading section-heading-{{ heading_alignment }}">
  {% if include.eyebrow %}
    <p class="eyebrow">{{ include.eyebrow }}</p>
  {% endif %}

  {% if include.title %}
    <h2>{{ include.title }}</h2>
  {% endif %}

  {% if include.subtitle %}
    <p class="lede">{{ include.subtitle }}</p>
  {% endif %}
</header>
