<section id="{{ include.section_id }}" class="section section-gallery" data-section-type="gallery">
  <div class="container">
    {% include section-heading.html eyebrow=include.section.eyebrow title=include.section.title subtitle=include.section.subtitle alignment=include.section.alignment %}
    {% if include.section.images %}
      <div class="gallery-grid">
        {% for image in include.section.images %}
          <figure class="gallery-item">
            <div class="gallery-placeholder">{{ image.category | default: "Club photo" }}</div>
            {% if image.caption %}
              <figcaption>{{ image.caption }}</figcaption>
            {% endif %}
          </figure>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</section>
