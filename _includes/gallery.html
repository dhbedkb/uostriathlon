<section id="{{ include.section_id }}" class="section section-gallery" data-section-type="gallery">
  <div class="container">
    {% include section-heading.html
      eyebrow=include.section.eyebrow
      title=include.section.title
      subtitle=include.section.subtitle
      alignment=include.section.alignment
    %}

    {% if include.section.images %}
      <div class="tile-grid tile-grid-three-up">
        {% for image in include.section.images %}
          <figure class="tile tile-surface">
            <div class="tile-frame">
              {% if image.src and image.src != "" %}
                <img src="{{ image.src | relative_url }}" alt="{{ image.alt | default: image.caption | default: 'Club photo' }}" loading="lazy">
              {% else %}
                <div class="tile-frame-placeholder"><span>Photo</span></div>
              {% endif %}
            </div>
            {% if image.caption %}
              <figcaption class="tile-body tile-text tile-muted">{{ image.caption }}</figcaption>
            {% endif %}
          </figure>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</section>
