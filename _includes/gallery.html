<section id="{{ include.section_id }}" class="section section-gallery" data-section-type="gallery">
  <div class="container">
    {% include section-heading.html
      eyebrow=include.section.eyebrow
      title=include.section.title
      subtitle=include.section.subtitle
      alignment=include.section.alignment
    %}

    {% if include.section.images %}
      <div class="tile-grid tile-grid-three-up">
        {% for image in include.section.images %}
          <figure class="tile tile-surface reveal reveal-card" data-reveal-mode="hover">
            <div class="tile-frame">
            {% if image.src %}
              <img src="{{ image.src | relative_url }}" alt="{{ image.alt | default: image.caption | default: 'Sheffield Triathlon club photo' }}" loading="lazy">
            {% else %}
              <div class="tile-frame-placeholder"><span>{{ image.category | default: "Club photo" }}</span></div>
            {% endif %}
            </div>
            {% if image.caption %}
              <figcaption class="tile-body reveal-body reveal-caption tile-text tile-muted">{{ image.caption }}</figcaption>
            {% endif %}
          </figure>
        {% endfor %}
      </div>
    {% endif %}
  </div>
</section>
