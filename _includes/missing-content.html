<section class="section section-missing-content">
  <div class="container">
    <p class="eyebrow">Content missing</p>
    <h1>{{ include.page_title | default: "Page content unavailable" }}</h1>
    <p class="lede">
      This page is connected to a content file, but the file could not be found or does not include any sections.
    </p>
    {% if include.content_key %}
      <div class="u-tile tile notice-card">
        <p>Expected content file:</p>
        <code>_data/content/{{ include.content_key }}.yml</code>
      </div>
    {% endif %}
  </div>
</section>
