backend:
  name: github
  repo: dhbedkb/uostriathlon
  branch: main
  base_url: https://uostriathlon-cms-auth.barnabytri.workers.dev
  auth_endpoint: auth

media_folder: /assets/images/uploads
public_folder: /uostriathlon/assets/images/uploads
publish_mode: simple
site_url: https://dhbedkb.github.io/uostriathlon/

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home
        file: _data/content/home.yml
        fields: &page_fields
          - {label: Title, name: title, widget: string}
          - {label: Description, name: description, widget: text, required: false}
          - label: Sections
            name: sections
            widget: list
            typeKey: type
            types:
              - name: hero
                label: Hero
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - {label: Body, name: body, widget: text, required: false}
                  - label: Source background image
                    name: background_image_raw
                    widget: image
                    required: false
                    choose_url: false
                    media_folder: /assets/images/source
                    public_folder: /uostriathlon/assets/images/source
                    hint: Upload the original photo. The editor preview uses this immediately.
                  - label: Optimised background image
                    name: background_image
                    widget: string
                    required: false
                    hint: Generated automatically on publish. Do not edit manually — the live site uses this compressed version.
                  - {label: "Background crop horizontal %", name: background_crop_x, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false, hint: "0 = left, 50 = centre, 100 = right"}
                  - {label: "Background crop vertical %", name: background_crop_y, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false, hint: "0 = top, 50 = centre, 100 = bottom"}
                  - {label: "Background crop zoom %", name: background_crop_zoom, widget: number, default: 100, min: 100, max: 220, value_type: int, required: false, hint: "100 = normal, increase to zoom in"}
                  - label: Persistent hero
                    name: persistent_hero
                    widget: boolean
                    default: false
                    required: false
                  - label: Primary button
                    name: primary_button
                    widget: object
                    required: false
                    fields:
                      - {label: Label, name: label, widget: string}
                      - {label: URL, name: url, widget: string}
                  - label: Secondary button
                    name: secondary_button
                    widget: object
                    required: false
                    fields:
                      - {label: Label, name: label, widget: string}
                      - {label: URL, name: url, widget: string}

              - name: text
                label: Text block
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - {label: Body, name: body, widget: markdown, required: false}

              - name: stats
                label: Stats
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - {label: Number, name: number, widget: string}
                      - {label: Label, name: label, widget: string}

              - name: cards
                label: Add/remove boxes
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Cards
                    name: cards
                    widget: list
                    fields:
                      - {label: Title, name: title, widget: string}
                      - {label: Label, name: label, widget: string, required: false}
                      - {label: Description, name: description, widget: text, required: false}
                      - label: Source image
                        name: image_raw
                        widget: image
                        required: false
                        choose_url: false
                        media_folder: /assets/images/source
                        public_folder: /uostriathlon/assets/images/source
                      - label: Optimised image
                        name: image
                        widget: string
                        required: false
                        hint: Generated automatically on publish. Do not edit manually.
                      - &crop_x {label: "Crop horizontal %", name: crop_x, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false, hint: "0 = left, 50 = centre, 100 = right"}
                      - &crop_y {label: "Crop vertical %", name: crop_y, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false, hint: "0 = top, 50 = centre, 100 = bottom"}
                      - &crop_zoom {label: "Crop zoom %", name: crop_zoom, widget: number, default: 100, min: 100, max: 220, value_type: int, required: false, hint: "100 = normal, increase to zoom in"}
                      - {label: URL, name: url, widget: string, required: false}
                      - {label: Schedule, name: schedule, widget: string, required: false}
                      - {label: Location, name: location, widget: string, required: false}

              - name: tile_grid
                label: Tile grid
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Tiles
                    name: tiles
                    widget: list
                    required: false
                    summary: '{{fields.title}}'
                    fields:
                      - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                      - {label: Title, name: title, widget: string, required: false}
                      - {label: Subtitle, name: subtitle, widget: string, required: false}
                      - {label: Body, name: body, widget: text, required: false}
                      - label: Nested tiles
                        name: children
                        widget: list
                        required: false
                        summary: '{{fields.title}}'
                        fields:
                          - {label: Title, name: title, widget: string, required: false}
                          - {label: Body, name: body, widget: text, required: false}

              - name: gallery
                label: Gallery
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Images
                    name: images
                    widget: list
                    fields:
                      - label: Source image
                        name: src_raw
                        widget: image
                        required: false
                        choose_url: false
                        media_folder: /assets/images/source
                        public_folder: /uostriathlon/assets/images/source
                      - label: Optimised image
                        name: src
                        widget: string
                        required: false
                        hint: Generated automatically on publish. Do not edit manually.
                      - *crop_x
                      - *crop_y
                      - *crop_zoom
                      - {label: Alt text, name: alt, widget: string, required: false}
                      - {label: Caption, name: caption, widget: string, required: false}

              - name: events
                label: Events list
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - {label: Title, name: title, widget: string}
                      - {label: Date, name: date, widget: string, required: false}
                      - {label: Location, name: location, widget: string, required: false}
                      - {label: Type, name: type, widget: string, required: false}
                      - {label: Description, name: description, widget: text, required: false}
                      - {label: URL, name: url, widget: string, required: false}

              - name: committee
                label: Committee members
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Members
                    name: members
                    widget: list
                    summary: '{{fields.name}} — {{fields.role}}'
                    fields:
                      - label: Source photo
                        name: image_raw
                        widget: image
                        required: false
                        choose_url: false
                        media_folder: /assets/images/committee/raw
                        public_folder: /uostriathlon/assets/images/committee/raw
                        hint: Upload the original photo here. The editor preview uses this immediately.
                      - label: Optimised photo
                        name: image_profile
                        widget: string
                        required: false
                        hint: Generated automatically on publish. Do not edit manually — the live site uses this compressed version.
                      - *crop_x
                      - *crop_y
                      - *crop_zoom
                      - {label: Name, name: name, widget: string, required: false}
                      - {label: Role, name: role, widget: string, required: false}
                      - {label: Bio, name: bio, widget: text, required: false}
                      - {label: Email, name: email, widget: string, required: false}
                      - label: Optional questions
                        name: questions
                        widget: list
                        required: false
                        summary: '{{fields.question}}'
                        fields:
                          - {label: Question, name: question, widget: string, required: false}
                          - {label: Answer, name: answer, widget: text, required: false}

              - name: sponsors
                label: Sponsors
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Sponsors
                    name: sponsors
                    widget: list
                    fields:
                      - {label: Name, name: name, widget: string}
                      - {label: Description, name: description, widget: text, required: false}
                      - {label: URL, name: url, widget: string, required: false}

              - name: timeline
                label: Timeline
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - {label: Title, name: title, widget: string}
                      - {label: Description, name: description, widget: text, required: false}

              - name: faq
                label: FAQ
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - {label: Question, name: question, widget: string}
                      - {label: Answer, name: answer, widget: markdown}

              - name: cta
                label: Call to action
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Body, name: body, widget: text, required: false}
                  - label: Primary button
                    name: primary_button
                    widget: object
                    required: false
                    fields:
                      - {label: Label, name: label, widget: string}
                      - {label: URL, name: url, widget: string}
                  - label: Secondary button
                    name: secondary_button
                    widget: object
                    required: false
                    fields:
                      - {label: Label, name: label, widget: string}
                      - {label: URL, name: url, widget: string}

              - name: embed
                label: Embed or widget
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - {label: Raw embed HTML, name: embed_html, widget: text, required: false}
                  - label: Embeds
                    name: embeds
                    widget: list
                    required: false
                    fields:
                      - {label: Provider, name: provider, widget: string, required: false}
                      - {label: Title, name: title, widget: string, required: false}
                      - {label: Description, name: description, widget: text, required: false}
                      - {label: URL, name: url, widget: string, required: false}
                      - {label: Button label, name: button_label, widget: string, required: false}
                      - {label: Embed HTML, name: embed_html, widget: text, required: false}
                      - {label: Frame width, name: frame_width, widget: string, required: false}

              - name: socials
                label: Social links
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - {label: Layout, name: layout, widget: select, options: [logos, cards], required: false}
                  - label: Items
                    name: items
                    widget: list
                    fields:
                      - {label: Platform, name: platform, widget: string}
                      - label: Source icon
                        name: icon_raw
                        widget: image
                        required: false
                        choose_url: false
                        media_folder: /assets/images/source
                        public_folder: /uostriathlon/assets/images/source
                      - label: Optimised icon
                        name: icon
                        widget: string
                        required: false
                        hint: Generated automatically on publish. Do not edit manually.
                      - *crop_x
                      - *crop_y
                      - *crop_zoom
                      - {label: Title, name: title, widget: string, required: false}
                      - {label: Description, name: description, widget: text, required: false}
                      - {label: URL, name: url, widget: string}
                      - {label: Button label, name: button, widget: string, required: false}

              - name: relay-bar
                label: Relay bar
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}

      - {name: training, label: Training, file: _data/content/training.yml, fields: *page_fields}
      - {name: races, label: Races, file: _data/content/races.yml, fields: *page_fields}
      - {name: socials, label: Socials, file: _data/content/socials.yml, fields: *page_fields}
      - {name: committee, label: Our Committee, file: _data/content/committee.yml, fields: *page_fields}
      - {name: members, label: Members Area, file: _data/content/members.yml, fields: *page_fields}

  - name: settings
    label: Site settings
    files:
      - name: settings
        label: Brand and settings
        file: _data/settings.yml
        fields:
          - label: Brand
            name: brand
            widget: object
            fields:
              - {label: Name, name: name, widget: string}
              - {label: Short name, name: short_name, widget: string}
              - {label: Tagline, name: tagline, widget: string}
              - {label: Email, name: email, widget: string}
              - label: Logo
                name: logo
                widget: image
                required: false
                choose_url: false
                media_folder: /assets/images/brand
                public_folder: /uostriathlon/assets/images/brand
              - {label: "Logo crop horizontal %", name: logo_crop_x, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false}
              - {label: "Logo crop vertical %", name: logo_crop_y, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false}
              - {label: "Logo crop zoom %", name: logo_crop_zoom, widget: number, default: 100, min: 100, max: 220, value_type: int, required: false}
          - label: Theme
            name: theme
            widget: object
            required: false
            fields:
              - {label: Default, name: default, widget: string, required: false}
          - label: Footer
            name: footer
            widget: object
            required: false
            fields:
              - {label: Description, name: description, widget: text, required: false}
              - {label: Affiliation, name: affiliation, widget: text, required: false}

      - name: navigation
        label: Navigation
        file: _data/navigation.yml
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - {label: Label, name: label, widget: string}
              - {label: URL, name: url, widget: string}
          - label: Join button
            name: cta
            widget: object
            fields:
              - {label: Label, name: label, widget: string}
              - {label: URL, name: url, widget: string}

      - name: socials_list
        label: Footer social links
        file: _data/socials.yml
        fields:
          - label: Items
            name: items
            widget: list
            fields:
              - {label: Platform, name: platform, widget: string}
              - {label: Label, name: label, widget: string}
              - {label: URL, name: url, widget: string}
