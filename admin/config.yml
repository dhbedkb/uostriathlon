          min: 100
          max: 220
          value_type: int
          required: false
        - label: Primary button
          name: primary_button
          widget: object
          required: false
          fields:
          - label: Label
            name: label
            widget: string
          - label: URL
            name: url
            widget: string
        - label: Secondary button
          name: secondary_button
          widget: object
          required: false
          fields:
          - label: Label
            name: label
            widget: string
          - label: URL
