          required: false
          choose_url: false
          media_folder: /assets/images/source
          public_folder: /uostriathlon/assets/images/source
        - label: Generated background WebP
          name: background_image
          widget: string
          required: false
          hint: Generated automatically. Do not edit manually.
        - label: Background crop horizontal %
          name: background_crop_x
          widget: number
          default: 50
          min: 0
          max: 100
          value_type: int
          required: false
        - label: Background crop vertical %
          name: background_crop_y
          widget: number
          default: 50
          min: 0
          max: 100
          value_type: int
          required: false
        - label: Background crop zoom %
