backend:
  name: github
  repo: dhbedkb/uostriathlon
  branch: main
  base_url: https://uostriathlon-cms-auth.barnabytri.workers.dev
  auth_endpoint: auth

media_folder: /assets/images/uploads
public_folder: /uostriathlon/assets/images/uploads
publish_mode: simple
site_url: https://dhbedkb.github.io/uostriathlon/

collections:
  - name: pages
    label: Pages
    files:
      - name: home
        label: Home
        file: _data/content/home.yml
        fields: &page_fields
          - {label: Title, name: title, widget: string}
          - {label: Description, name: description, widget: text, required: false}
          - label: Sections
            name: sections
            widget: list
            typeKey: type
            summary: '{{fields.type}} — {{fields.title}}'
            hint: >
              A page is built from four kinds of block. Hero and Text are
              one-off layouts. Divider bar is a small decorative widget.
              Card grid is used for everything else — cards, photos,
              committee members, sponsors, stats, FAQs, events, a call to
              action, embeds, social links — pick a preset inside it as a
              label/reminder for what you're building; every field below
              is still available no matter which preset you pick.
            types:
              - name: hero
                label: Hero
                fields: &hero_fields
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - {label: Body, name: body, widget: text, required: false}
                  - label: Source background image
                    name: background_image_raw
                    widget: image
                    required: false
                    choose_url: false
                    media_folder: /assets/images/source
                    public_folder: /uostriathlon/assets/images/source
                    hint: Upload the original photo. The editor preview uses this immediately.
                  - label: Optimised background image
                    name: background_image
                    widget: string
                    required: false
                    hint: Generated automatically on publish. Do not edit manually — the live site uses this compressed version.
                  - {label: "Background crop horizontal %", name: background_crop_x, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false, hint: "0 = left, 50 = centre, 100 = right"}
                  - {label: "Background crop vertical %", name: background_crop_y, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false, hint: "0 = top, 50 = centre, 100 = bottom"}
                  - {label: "Background crop zoom %", name: background_crop_zoom, widget: number, default: 100, min: 100, max: 220, value_type: int, required: false, hint: "100 = normal, increase to zoom in"}
                  - label: Persistent hero
                    name: persistent_hero
                    widget: boolean
                    default: false
                    required: false
                  - label: Primary button
                    name: primary_button
                    widget: object
                    required: false
                    fields: &button_fields
                      - {label: Label, name: label, widget: string}
                      - {label: URL, name: url, widget: string}
                  - label: Secondary button
                    name: secondary_button
                    widget: object
                    required: false
                    fields: *button_fields

              - name: text
                label: Text block
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - {label: Body, name: body, widget: markdown, required: false}

              - name: relay-bar
                label: Divider bar
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}

              - name: tile-grid
                label: Card grid
                fields:
                  - {label: ID, name: id, widget: string, required: false}
                  - label: Preset
                    name: preset
                    widget: select
                    required: false
                    default: custom
                    hint: >
                      A label only, to help you find this block again and
                      to remind you which fields below are worth filling
                      in for this kind of content — Decap CMS can't change
                      which fields appear based on this choice, so nothing
                      is hidden and you're free to mix and match. See
                      docs/editor-guide.md for the recommended Content
                      order per preset.


                      Committee member: fill in Title (name), Subtitle
                      (role), Image (photo), Body (bio), Email. Suggested
                      order: Title, Subtitle, Image, Body, Email, Buttons.


                      Event: fill in Badge (date), Title (event name),
                      Image, Body (description), Buttons. Meta rows work
                      well for Type/Location.


                      FAQ: fill in Title (the question), Body (the
                      answer). Suggested order: Title, Body.


                      Sponsor: fill in Title (organisation), Image (logo),
                      Body (description), Buttons (website link).


                      Cards / Gallery / Stats / Custom: use whichever
                      fields you need — most read best with everything
                      set to Always visible.
                    options:
                      - {label: "Cards", value: cards}
                      - {label: "Gallery", value: gallery}
                      - {label: "Committee / people", value: committee}
                      - {label: "Sponsors", value: sponsors}
                      - {label: "Statistics", value: stats}
                      - {label: "Events", value: events}
                      - {label: "FAQ", value: faq}
                      - {label: "Call to action", value: cta}
                      - {label: "Social links", value: socials}
                      - {label: "Embed", value: embed}
                      - {label: "Timeline / steps", value: timeline}
                      - {label: "Custom", value: custom}
                  - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                  - {label: Title, name: title, widget: string, required: false}
                  - {label: Subtitle, name: subtitle, widget: string, required: false}
                  - {label: Heading alignment, name: alignment, widget: select, options: [left, center], default: left, required: false}
                  - label: Layout
                    name: layout
                    widget: object
                    hint: Controls how the tiles below are arranged. Leave everything on its default for a good result.
                    fields:
                      - {label: Columns (desktop), name: columns, widget: select, options: ["1", "2", "3", "4"], default: "3", required: false}
                      - {label: Equal height tiles, name: equal_height, widget: boolean, default: true, required: false}
                      - {label: Scroll horizontally instead of wrapping, name: scroll, widget: boolean, default: false, required: false, hint: Only enable this if there are more tiles than fit in one row.}
                      - {label: Width, name: width, widget: select, options: [normal, narrow, wide], default: normal, required: false}
                      - {label: Padding, name: padding, widget: select, options: [normal, compact, spacious], default: normal, required: false}
                      - {label: Background, name: background, widget: select, options: [default, surface, accent], default: default, required: false}
                      - {label: Numbered steps, name: numbered, widget: boolean, default: false, required: false, hint: "For a timeline/step list — shows 1, 2, 3… beside each tile instead of a grid."}
                      - {label: Compact icon row, name: chip_style, widget: boolean, default: false, required: false, hint: "For a row of small round icon links, e.g. social platform icons."}
                      - {label: Centre single tile, name: align_center, widget: boolean, default: false, required: false, hint: "For a single centred call-to-action tile."}
                  - label: Behaviour
                    name: behavior
                    widget: object
                    hint: >
                      Whether tiles in this grid can hide extra detail
                      until opened (committee bios, FAQ answers, etc). How
                      opening works — hover or click — is set once for
                      the whole site under Site Settings > Interactions,
                      not here.
                    fields:
                      - {label: Expandable, name: expandable, widget: boolean, default: false, required: false, hint: "On = tiles can show a summary first and reveal the rest when opened. Off = every tile always shows everything."}
                  - label: Tiles
                    name: tiles
                    widget: list
                    summary: '{{fields.title}}{{fields.eyebrow}}'
                    fields: &tile_fields
                      - {label: Visual style, name: style, widget: select, options: [default, accent], default: default, required: false, hint: "'Accent' highlights a single tile — used for a call-to-action block."}
                      - {label: Badge (small tag, e.g. a date), name: badge, widget: string, required: false, hint: "Always shown, positioned in the corner — not part of Content order below."}
                      - {label: Eyebrow, name: eyebrow, widget: string, required: false}
                      - {label: Title, name: title, widget: string, required: false}
                      - {label: Subtitle, name: subtitle, widget: string, required: false}
                      - {label: Body, name: body, widget: markdown, required: false}
                      - label: Image
                        name: image
                        widget: object
                        required: false
                        fields:
                          - label: Source image
                            name: src_raw
                            widget: image
                            required: false
                            choose_url: false
                            media_folder: /assets/images/source
                            public_folder: /uostriathlon/assets/images/source
                          - label: Optimised image
                            name: src
                            widget: string
                            required: false
                            hint: Generated automatically on publish. Do not edit manually.
                          - {label: "Crop horizontal %", name: crop_x, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false}
                          - {label: "Crop vertical %", name: crop_y, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false}
                          - {label: "Crop zoom %", name: crop_zoom, widget: number, default: 100, min: 100, max: 220, value_type: int, required: false}
                          - {label: Shape, name: shape, widget: select, options: ["", square, round], default: "", required: false, hint: "Leave blank to use the site's default image shape (Site Settings > Design system > Cards)."}
                          - {label: Alt text, name: alt, widget: string, required: false}
                          - {label: Caption, name: caption, widget: string, required: false}
                      - label: Embed (use instead of Image for iframes/widgets)
                        name: embed
                        widget: object
                        required: false
                        fields:
                          - {label: Provider, name: provider, widget: string, required: false}
                          - {label: Raw embed HTML, name: embed_html, widget: text, required: false}
                          - {label: Frame width, name: width, widget: string, required: false}
                          - {label: Fallback link URL, name: url, widget: string, required: false, hint: Used only if no embed HTML is set.}
                          - {label: Fallback link label, name: button_label, widget: string, required: false}
                      - label: Meta rows (e.g. Location, Schedule)
                        name: meta
                        widget: list
                        required: false
                        summary: '{{fields.label}}'
                        fields:
                          - {label: Label, name: label, widget: string}
                          - {label: Value, name: value, widget: string}
                      - label: Questions & answers
                        name: qa
                        widget: list
                        required: false
                        summary: '{{fields.question}}'
                        fields:
                          - {label: Question, name: question, widget: string, required: false}
                          - {label: Answer, name: answer, widget: text, required: false}
                      - {label: Email, name: email, widget: string, required: false}
                      - label: Buttons
                        name: buttons
                        widget: list
                        required: false
                        summary: '{{fields.label}}'
                        fields:
                          - {label: Label, name: label, widget: string}
                          - {label: URL, name: url, widget: string}
                          - {label: Style, name: style, widget: select, options: [primary, secondary], default: secondary, required: false}
                      - label: Content order
                        name: content_order
                        widget: list
                        required: false
                        collapsed: true
                        summary: '{{fields.type}}'
                        hint: >
                          Drag to reorder — this list IS the order the
                          website renders in, top to bottom. Add each
                          piece of content you want this tile to show.
                          Leave empty to use the default order (Image,
                          Eyebrow, Title, Subtitle, Body, Q&A, Meta rows,
                          Email, Buttons). Badge is not included here;
                          it's a fixed corner tag, always shown.
                        fields:
                          - label: Content type
                            name: type
                            widget: select
                            options:
                              - {label: Eyebrow, value: eyebrow}
                              - {label: Title, value: title}
                              - {label: Subtitle, value: subtitle}
                              - {label: Image, value: image}
                              - {label: Body, value: body}
                              - {label: Questions & answers, value: qa}
                              - {label: Meta rows, value: meta}
                              - {label: Email, value: email}
                              - {label: Buttons, value: buttons}
                      - label: Visibility
                        name: visibility
                        widget: object
                        required: false
                        collapsed: true
                        hint: >
                          Whether each piece of content starts visible or
                          hidden. Leave a field on its blank/default
                          setting to fall back to this grid's Expandable
                          setting above (Eyebrow, Title, Subtitle and
                          Image always fall back to Always visible
                          regardless). There's no separate hover/click
                          choice any more — that's one site-wide setting
                          under Site Settings > Interactions.
                        fields:
                          - {label: Eyebrow, name: eyebrow, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Title, name: title, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Subtitle, name: subtitle, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Image, name: image, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Body, name: body, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Questions & answers, name: qa, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Meta rows, name: meta, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Email, name: email, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                          - {label: Buttons, name: buttons, widget: select, options: ["", always, hidden_initially, hidden], default: "", required: false}
                      - label: Advanced
                        name: behavior
                        widget: object
                        required: false
                        collapsed: true
                        hint: Only needed to make one specific tile behave differently from the rest of its grid.
                        fields:
                          - {label: "Expandable override", name: expandable, widget: select, options: ["", "yes", "no"], default: "", required: false, hint: "Leave blank to use the grid's Expandable setting."}

      - {name: training, label: Training, file: _data/content/training.yml, fields: *page_fields}
      - {name: races, label: Races, file: _data/content/races.yml, fields: *page_fields}
      - {name: socials, label: Socials, file: _data/content/socials.yml, fields: *page_fields}
      - {name: committee, label: Our Committee, file: _data/content/committee.yml, fields: *page_fields}
      - {name: members, label: Members Area, file: _data/content/members.yml, fields: *page_fields}

  - name: settings
    label: Site settings
    files:
      - name: settings
        label: Brand and settings
        file: _data/settings.yml
        fields:
          - label: Brand
            name: brand
            widget: object
            fields:
              - {label: Name, name: name, widget: string}
              - {label: Short name, name: short_name, widget: string}
              - {label: Tagline, name: tagline, widget: string}
              - {label: Email, name: email, widget: string}
              - label: Logo
                name: logo
                widget: image
                required: false
                choose_url: false
                media_folder: /assets/images/brand
                public_folder: /uostriathlon/assets/images/brand
                hint: PNG with a transparent background works best — the logo sits in a plain circular frame with no fixed background colour behind it.
              - {label: "Logo crop horizontal %", name: logo_crop_x, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false}
              - {label: "Logo crop vertical %", name: logo_crop_y, widget: number, default: 50, min: 0, max: 100, value_type: int, required: false}
              - {label: "Logo crop zoom %", name: logo_crop_zoom, widget: number, default: 100, min: 100, max: 220, value_type: int, required: false}
          - label: Theme
            name: theme
            widget: object
            required: false
            fields:
              - {label: Default, name: default, widget: select, options: [dark, light], default: dark, required: false}
          - label: Design system
            name: design
            widget: object
            required: false
            hint: These become the site's defaults everywhere at once — no CSS or code required. Individual sections can still override background/width/padding themselves.
            fields:
              - label: Colours
                name: colors
                widget: object
                fields:
                  - {label: Primary (accent gold, buttons, links), name: primary, widget: color, required: false}
                  - {label: Text, name: secondary, widget: color, required: false}
                  - {label: Accent (reserved for future use), name: accent, widget: color, required: false}
              - label: Cards
                name: cards
                widget: object
                fields:
                  - {label: Corner roundness, name: radius, widget: select, options: [none, small, normal, large], default: normal, required: false}
                  - {label: Shadow, name: shadow, widget: select, options: [none, soft, hard], default: soft, required: false}
                  - {label: Padding, name: padding, widget: select, options: [compact, normal, spacious], default: normal, required: false}
                  - {label: "Default image shape", name: image_shape, widget: select, options: [square, round], default: square, required: false, hint: "Used whenever a tile's own image doesn't set a Shape."}
              - label: Typography
                name: typography
                widget: object
                fields:
                  - {label: Heading weight, name: heading_style, widget: select, options: [normal, bold, black], default: black, required: false}
                  - {label: Body text density, name: body_style, widget: select, options: [compact, normal, relaxed], default: normal, required: false}
              - label: Layout
                name: layout
                widget: object
                fields:
                  - {label: Page width, name: container_width, widget: select, options: [narrow, normal, wide], default: normal, required: false}
                  - {label: Grid gap, name: grid_gap, widget: select, options: [compact, normal, spacious], default: normal, required: false}
                  - {label: Vertical section spacing, name: vertical_spacing, widget: select, options: [compact, normal, spacious], default: normal, required: false}
          - label: Interactions
            name: interactions
            widget: object
            required: false
            hint: One setting, applied to every expandable card grid on the site.
            fields:
              - {label: "How hidden content is revealed", name: expand_trigger, widget: select, options: [hover, click], default: hover, required: false, hint: "Hover works well on desktop; Click is more reliable on touch screens and is what happens on mobile either way."}
          - label: Footer
            name: footer
            widget: object
            required: false
            fields:
              - {label: Description, name: description, widget: text, required: false}
              - {label: Affiliation, name: affiliation, widget: text, required: false}

      - name: navigation
        label: Navigation
        file: _data/navigation.yml
        fields:
          - label: Items
            name: items
            widget: list
            summary: '{{fields.label}}'
            fields:
              - {label: Label, name: label, widget: string}
              - {label: URL, name: url, widget: string}
          - label: Join button
            name: cta
            widget: object
            fields:
              - {label: Label, name: label, widget: string}
              - {label: URL, name: url, widget: string}

      - name: socials_list
        label: Footer social links
        file: _data/socials.yml
        fields:
          - label: Items
            name: items
            widget: list
            summary: '{{fields.platform}}'
            fields:
              - {label: Platform, name: platform, widget: string}
              - {label: Label, name: label, widget: string}
              - {label: URL, name: url, widget: string}
