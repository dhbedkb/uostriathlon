backend:
  name: github
  repo: dhbedkb/uostriathlon
  branch: main
  base_url: https://uostriathlon-cms-auth.barnabytri.workers.dev
  auth_endpoint: auth
media_folder: /assets/images/uploads
public_folder: /uostriathlon/assets/images/uploads
publish_mode: simple
site_url: https://dhbedkb.github.io/uostriathlon/
collections:
- name: pages
  label: Pages
  files:
  - name: home
    label: Home
    file: _data/content/home.yml
    fields: &id001
    - label: Title
      name: title
      widget: string
    - label: Description
      name: description
      widget: text
      required: false
    - label: Sections
      name: sections
      widget: list
      typeKey: type
      types:
      - name: hero
        label: Hero
        fields:
        - label: ID
          name: id
          widget: string
          required: false
        - label: Eyebrow
          name: eyebrow
          widget: string
          required: false
        - label: Title
          name: title
          widget: string
          required: false
        - label: Subtitle
